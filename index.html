<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Sticker Sender by Jarrar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1> WhatsApp Sticker Sender by Jarrar </h1>
    <h2>Fast and Secure</h2>
    <h3>Developed By Jarrar</h3>

    <p>Select Your Emoji:</p>

    <div class="sticker-container" id="stickerContainer">
    </div>

    <h2>Your Selected Items:</h2>
    <div class="selected-container" id="selectedContainer">
    </div>

    <!-- Phone Number Input (Naya) -->
    <div class="phone-section">
        <p> Enter Your WhatsApp contact number (with code eg +92):</p>
        <input type="text" id="phoneNumber" class="phone-input" placeholder="+92---------">
    </div>

    <!-- Action Buttons -->
    <div class="action-buttons">
        <button class="copy-btn" onclick="copyToClipboard()">
            📋 Copy Your Emojis
        </button>
        <button class="send-btn" onclick="sendToWhatsApp()">
            📤 Send to WhatsApp
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
